<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>远程面板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
  --danger: #f85149; --success: #3fb950;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  display: flex; flex-direction: column;
}

/* 登录 */
#login-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 24px;
}
#login-screen .logo {
  font-size: 28px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), #a371f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#login-screen .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
#login-screen input {
  width: 100%; max-width: 300px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 16px; outline: none;
}
#login-screen input:focus { border-color: var(--accent); }
#login-screen button {
  width: 100%; max-width: 300px; margin-top: 12px; padding: 12px;
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
#login-screen button:active { opacity: 0.8; }
#login-screen button:disabled { opacity: 0.5; cursor: not-allowed; }
#login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 20px; text-align: center; }

/* 主界面 */
#main-screen { display: none; flex-direction: column; height: 100%; }
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#topbar .info { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
#topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
#topbar .dot.off { background: var(--danger); }
#topbar .actions { display: flex; gap: 8px; }
#topbar button {
  padding: 4px 10px; background: var(--border); color: var(--text);
  border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
}
#topbar button:active { opacity: 0.7; }
#topbar .danger { background: rgba(248,81,73,0.15); color: var(--danger); }

/* 终端 */
#term-wrap {
  flex: 1; overflow: auto; padding: 2px;
  -webkit-overflow-scrolling: touch;
}
#term-wrap .xterm-viewport::-webkit-scrollbar { width: 4px; }
#term-wrap .xterm-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 底部输入 */
#input-bar {
  display: flex; gap: 6px; padding: 6px 8px;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
}
#msg-input {
  flex: 1; padding: 10px 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 15px; outline: none;
  font-family: "Cascadia Code", "Consolas", monospace;
}
#msg-input:focus { border-color: var(--accent); }
#send-btn {
  padding: 10px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
#send-btn:active { opacity: 0.8; }
#ctrl-c-btn {
  padding: 10px 12px; background: rgba(248,81,73,0.2); color: var(--danger);
  border: 1px solid rgba(248,81,73,0.3); border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
#ctrl-c-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="logo">远程面板</div>
  <div class="subtitle">输入密码以连接</div>
  <input type="password" id="pw-input" placeholder="密码" autocomplete="off">
  <button id="login-btn" onclick="login()">连接</button>
  <div id="login-error"></div>
</div>

<div id="main-screen">
  <div id="topbar">
    <div class="info">
      <span class="dot" id="dot"></span>
      <span id="status">已连接</span>
      <span id="count"></span>
    </div>
    <div class="actions">
      <button onclick="restart()">重启</button>
      <button class="danger" onclick="logout()">退出</button>
    </div>
  </div>
  <div id="term-wrap"></div>
  <div id="input-bar">
    <input type="text" id="msg-input" placeholder="输入消息..." autocomplete="off">
    <button id="send-btn" onclick="sendCmd()">发送</button>
    <button id="ctrl-c-btn" onclick="sendCtrlC()" title="Ctrl+C">C-c</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script>
// 固定尺寸，与服务器 PTY 一致
const COLS = 100, ROWS = 35, FONT = 14;

let term, ws, timer;

function status(on, text) {
  document.getElementById('dot').className = 'dot' + (on ? '' : ' off');
  document.getElementById('status').textContent = text || (on ? '已连接' : '未连接');
}

// ====== 登录 ======
async function login() {
  const pw = document.getElementById('pw-input').value;
  const b = document.getElementById('login-btn');
  const e = document.getElementById('login-error');
  if (!pw) { e.textContent = '请输入密码'; return; }
  b.disabled = true; b.textContent = '连接中...'; e.textContent = '';

  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { e.textContent = d.error; b.disabled = false; b.textContent = '连接'; return; }
    localStorage.setItem('rc_token', d.token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    init();
    connect(d.token);
    document.getElementById('msg-input').focus();
  } catch (x) {
    e.textContent = '网络错误，请检查服务是否启动';
    b.disabled = false; b.textContent = '连接';
  }
}

document.getElementById('pw-input').addEventListener('keydown', ev => {
  if (ev.key === 'Enter') login();
});

// ====== 终端 ======
function init() {
  if (term) { term.dispose(); }
  term = new Terminal({
    cols: COLS, rows: ROWS, fontSize: FONT,
    fontFamily: '"Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", monospace',
    theme: {
      background: '#0d1117', foreground: '#c9d1d9',
      cursor: '#58a6ff', cursorAccent: '#0d1117',
      selectionBackground: '#264f78',
      black: '#484f58', red: '#ff7b72', green: '#3fb950',
      yellow: '#d29922', blue: '#58a6ff', magenta: '#bc8cff',
      cyan: '#39c5cf', white: '#b1bac4',
      brightBlack: '#6e7681', brightRed: '#ffa198',
      brightGreen: '#56d364', brightYellow: '#e3b341',
      brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
      brightCyan: '#56d4dd', brightWhite: '#f0f6fc'
    },
    cursorBlink: true, cursorStyle: 'bar',
    scrollback: 5000
  });
  term.open(document.getElementById('term-wrap'));
  term.onData(data => {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data }));
  });
}

// 底部输入栏
function sendCmd() {
  const inp = document.getElementById('msg-input');
  const t = inp.value;
  if (!t || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'input', data: t + '\r' }));
  inp.value = '';
}

document.getElementById('msg-input').addEventListener('keydown', ev => {
  if (ev.key === 'Enter') sendCmd();
});

function sendCtrlC() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'input', data: '\x03' }));
  }
}

// ====== WebSocket ======
function connect(token) {
  if (ws) { try { ws.close(); } catch(x) {} }
  const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(p + '//' + location.host + '/ws?token=' + token);

  ws.onopen = () => {
    status(true);
    if (timer) { clearTimeout(timer); timer = null; }
  };

  ws.onmessage = ev => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === 'output' && term) {
        term.write(m.data);
        if (document.getElementById('status').textContent !== '已连接') status(true);
      } else if (m.type === 'auth_error') {
        logout();
      } else if (m.type === 'clients') {
        document.getElementById('count').textContent =
          m.count > 1 ? '(' + m.count + ' 设备在线)' : '';
      }
    } catch(x) {}
  };

  ws.onclose = () => {
    status(false, '断开，5秒后重连');
    timer = setTimeout(() => {
      const t = localStorage.getItem('rc_token');
      if (t) connect(t);
    }, 5000);
  };

  ws.onerror = () => status(false, '连接出错');
}

function restart() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'restart' }));
    if (term) term.clear();
  }
}

function logout() {
  if (ws) ws.close();
  if (timer) clearTimeout(timer);
  localStorage.removeItem('rc_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  if (term) { term.dispose(); term = null; }
  document.getElementById('pw-input').value = '';
}

// 自动登录
(function() {
  const t = localStorage.getItem('rc_token');
  if (t) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    init();
    connect(t);
  }
})();
</script>
</body>
</html>
